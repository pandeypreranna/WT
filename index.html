<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Web Experiments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 40px;
            letter-spacing: 2px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 80%;
            max-width: 900px;
        }

        .card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            background: #f0f0ff;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>🌐 My Web Experiments</h1>

    <div class="container">
        <a href="expt 1/index.html" class="card">Experiment 1</a>
        <a href="expt 2/index.html" class="card">Experiment 2</a>
        <a href="expt 3/index.html" class="card">Experiment 3</a>
        <a href="expt 4/index.html" class="card">Experiment 4</a>
        <a href="expt 5/index.html" class="card">Experiment 5</a>
        <a href="expt 6/index.html" class="card">Experiment 6</a>
        <a href="expt 7/index.html" class="card">Experiment 7</a>
        <a href="expt 8/index.html" class="card">Experiment 8</a>
    </div>

    <footer>
        © 2026 | Designed by Me
    </footer>

</body>
</html>
